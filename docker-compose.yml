services:
  backend:
    build: .
    container_name: repolens-backend
    ports:
      - "8770:8770"
    env_file:
      - .env
    volumes:
      # 持久化 SQLite 数据库
      - ./data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: repolens-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
